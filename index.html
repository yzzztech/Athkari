<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0D9488">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="أذكاري">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📿</text></svg>">
  <title>أذكاري — أذكارك اليومية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- ═══ App Shell ═══ -->
  <div id="app" class="app-shell">

    <!-- ─── Status Bar Safe Area ─── -->
    <div class="safe-top"></div>

    <!-- ─── Header ─── -->
    <header class="app-header">
      <h1 class="header-title" id="headerTitle">أذكاري</h1>
      <div class="header-actions">
        <span id="streakDisplay" class="streak-badge"></span>
        <button class="icon-btn" id="themeToggle" aria-label="تغيير المظهر">
          <svg class="sun-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="moon-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <!-- ─── Sub Header (for back navigation) ─── -->
    <div class="sub-header" id="subHeader" style="display:none">
      <button class="back-btn" id="backBtn" aria-label="رجوع">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="sub-header-title" id="subHeaderTitle"></span>
      <span class="sub-header-spacer"></span>
    </div>

    <!-- ─── Main Content Area ─── -->
    <main class="main-content" id="mainContent">
      <!-- Dynamically rendered -->
    </main>

    <!-- ═══ Bottom Tab Bar (Native iOS Style) ═══ -->
    <nav class="tab-bar" id="tabBar">
      <button class="tab-bar-item active" data-tab="azkar">
        <span class="tab-icon">📿</span>
        <span class="tab-label">الأذكار</span>
      </button>
      <button class="tab-bar-item" data-tab="quran">
        <span class="tab-icon">📖</span>
        <span class="tab-label">المصحف</span>
      </button>
      <button class="tab-bar-item" data-tab="prayer">
        <span class="tab-icon">🕌</span>
        <span class="tab-label">الصلاة</span>
      </button>
      <button class="tab-bar-item" data-tab="more">
        <span class="tab-icon">⚙️</span>
        <span class="tab-label">المزيد</span>
      </button>
    </nav>

    <!-- ─── Safe Area Bottom ─── -->
    <div class="safe-bottom"></div>
  </div>

  <!-- ═══ Toast ═══ -->
  <div class="toast" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
